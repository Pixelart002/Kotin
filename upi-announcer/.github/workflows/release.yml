name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes'
        required: false
        type: string

jobs:
  prepare-release:
    name: Prepare Release v${{ github.event.inputs.version }}
    runs-on: ubuntu-24-04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          # Update package.json
          npm version $VERSION --no-git-tag-version
          
          # Update version in app
          sed -i "s/version: '.*'/version: '$VERSION'/" capacitor.config.json
          
          # Update version in Android
          cd android/app
          sed -i "s/versionName \".*\"/versionName \"$VERSION\"/" build.gradle
          cd ../..

      - name: Generate Changelog
        run: |
          echo "# Release v${{ github.event.inputs.version }}" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "${{ github.event.inputs.release_notes }}" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## Changes" >> CHANGELOG.md
          git log $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --pretty=format:"- %s" >> CHANGELOG.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json capacitor.config.json android/app/build.gradle CHANGELOG.md
          git commit -m "chore(release): v${{ github.event.inputs.version }}"
          git tag v${{ github.event.inputs.version }}
          git push origin main --tags