name: Build & Release APK

on:
  push:
    branches:
      - main
      - release/**
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli
      
      - name: Build web assets
        run: npm run build:prod
      
      - name: Sync Capacitor
        run: npx cap sync android
      
      - name: Create keystore
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          KEYSTORE_CONTENT: ${{ secrets.KEYSTORE_CONTENT }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_CONTENT" | base64 -d > keystore.jks
          chmod 600 keystore.jks
      
      - name: Build debug APK
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main')
        run: |
          cd android
          gradle wrapper
          ./gradlew assembleDebug
      
      - name: Build release APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_ALIAS_PASSWORD: ${{ secrets.KEYSTORE_ALIAS_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_PATH: keystore.jks
        run: |
          cd android
          gradle wrapper
          ./gradlew assembleRelease bundleRelease
      
      - name: Upload debug APK
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main')
        uses: actions/upload-artifact@v4
        with:
          name: upi-voice-alert-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
      
      - name: Upload release APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: upi-voice-alert-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
      
      - name: Upload release AAB (Android App Bundle)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: upi-voice-alert-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Run tests
        if: always()
        run: |
          cd android
          gradle wrapper
          ./gradlew test || true
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: android/app/build/reports/tests/
          retention-days: 7