name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-24-04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: |
          npx prettier --check "src/**/*.{js,jsx,ts,tsx,json,css}" || true

      - name: Lint code
        run: npm run lint || true

      - name: Type check
        run: npx tsc --noEmit || true

      - name: Run unit tests
        run: npm test -- --passWithNoTests || true

      - name: Build check
        run: |
          npm run build
          npm run build:prod

      - name: Size check
        run: |
          MAX_SIZE=5242880  # 5MB
          APK_SIZE=$(find android/app/build/outputs -name "*.apk" -exec du -b {} \; | cut -f1 || echo 0)
          if [ $APK_SIZE -gt $MAX_SIZE ]; then
            echo "⚠️ APK size exceeds 5MB"
          fi

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo, number } = context.issue;
            const runId = context.runId;
            
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: number,
              body: `✅ **PR Validation Complete**\n\n` +
                    `- Commit: ${context.sha}\n` +
                    `- Status: Success\n` +
                    `- [View Workflow Run](https://github.com/${owner}/${repo}/actions/runs/${runId})\n\n` +
                    `Once approved, this will be ready to merge! 🚀`
            });